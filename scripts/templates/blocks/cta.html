<section class="cta-wrap" id="contacto">
  <article class="cta-box">
    <p class="eyebrow">CTA final</p>
    <h2>{{CTA_HEADLINE}}</h2>
    <p>{{CTA_DESC}}</p>
    <div class="cta-actions">
      <a class="btn btn-primary" href="#">{{CTA_TEXT}}</a>
    </div>
  </article>
  <form class="form" id="leadForm">
    <input class="field" placeholder="Nombre" required />
    <input class="field" placeholder="WhatsApp" required type="tel" />
    <textarea class="field" placeholder="Contanos tu objetivo" rows="3"></textarea>
    <button class="btn btn-primary" id="submitBtn" type="submit">{{CTA_TEXT}}</button>
    <p class="ok" id="okMsg">Solicitud simulada enviada. En una implementación real entra al CRM.</p>
  </form>
</section>
