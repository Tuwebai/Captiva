<section class="hero section">
  <div class="hero-grid">
    <article>
      <p class="eyebrow">{{CATEGORY_LABEL}} demo</p>
      <h1>{{TITLE}}</h1>
      <p class="hero-lead">{{HEADLINE}}</p>
      <p class="hero-lead">{{DESCRIPTION}}</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="#contacto">{{CTA_TEXT}}</a>
        <a class="btn btn-secondary" href="#servicios">Ver servicios</a>
      </div>
      <div class="hero-trust">
        <span>Conversion first</span>
        <span>Diseño profesional</span>
        <span>SEO ready</span>
      </div>
    </article>
    <aside class="hero-media">
      <img src="{{HERO_IMAGE}}" alt="{{TITLE}}" loading="eager" />
    </aside>
  </div>
</section>
