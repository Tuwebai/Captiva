<section class="section plans" id="planes">

    <p class="eyebrow">Planes</p>
    <h2>{{PLANS_TITLE}}</h2>
    <p>{{PLANS_DESC}}</p>
  </header>
  <div class="plans-grid">
    <article class="plan-card">
      <h3>{{PLAN_1_NAME}}</h3>

      <p>{{PLAN_1_DESC}}</p>

    <article class="plan-card plan-card-featured">
      <p class="plan-pill">Recomendado</p>
      <h3>{{PLAN_2_NAME}}</h3>
      <p class="plan-price">{{PLAN_2_PRICE}}</p>
      <p>{{PLAN_2_DESC}}</p>
    </article>
    <article class="plan-card">
      <h3>{{PLAN_3_NAME}}</h3>
      <p class="plan-price">{{PLAN_3_PRICE}}</p>
      <p>{{PLAN_3_DESC}}</p>
    </article>
  </div>
