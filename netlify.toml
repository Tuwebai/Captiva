[build]
  base = "."
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[edge_functions]]
  path = "/demo/*"
  function = "demo-proxy"

[[edge_functions]]
  path = "/demos/*"
  function = "demo-guard"

[[redirects]]
  from = "/"
  to = "/captiva"
  status = 301
  force = true

[[redirects]]
  from = "/captiva"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/captiva/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://www.googletagmanager.com https://www.clarity.ms https://*.clarity.ms https://c.bing.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.clarity.ms https://*.clarity.ms https://c.bing.com; img-src 'self' data: https: https://www.google-analytics.com https://www.clarity.ms https://*.clarity.ms https://c.bing.com; font-src 'self' data: https://fonts.gstatic.com"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/LOGO-captiva.png"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/LOGO-captiva-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/demos/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Robots-Tag = "noindex, nofollow"
