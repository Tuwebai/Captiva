[build]
  base = "."
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[edge_functions]]
  path = "/demo/*"
  function = "demo-proxy"

[[edge_functions]]
  path = "/demos/*"
  function = "demo-guard"

[[redirects]]
  from = "/"
  to = "/captiva"
  status = 301
  force = true

[[redirects]]
  from = "/captiva"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/captiva/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/landing-page-para-*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/blog/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/ejemplo-landing-page-*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/landing-page-vs-*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/terminos-de-servicio"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/politica-de-privacidad"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/LOGO-captiva.png"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/LOGO-captiva-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/demos/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Robots-Tag = "noindex, nofollow"
