<section class="section plans" id="planes">
  <div class="plans-grid plans-grid--editorial">
    <header class="plans-intro">
      <p class="eyebrow">Oferta productizada</p>
      <h2>{{PLANS_TITLE}}</h2>
      <p>{{PLANS_DESC}}</p>
      <div class="hero-actions">
        <a href="#contacto" class="btn btn-primary">{{CTA_TEXT}}</a>
        <a href="#servicios" class="btn btn-secondary">{{CTA_SECONDARY}}</a>
      </div>
    </header>
    <div class="plans-grid">
      <article class="plan-card">
        <div class="plan-card__body">
          <h3>{{PLAN_1_NAME}}</h3>
          <p class="plan-price">{{PLAN_1_PRICE}}</p>
          <p>{{PLAN_1_DESC}}</p>
        </div>
      </article>
      <article class="plan-card plan-card-featured">
        <div class="plan-card__body">
          <p class="plan-pill">Mas elegido</p>
          <h3>{{PLAN_2_NAME}}</h3>
          <p class="plan-price">{{PLAN_2_PRICE}}</p>
          <p>{{PLAN_2_DESC}}</p>
        </div>
      </article>
      <article class="plan-card">
        <div class="plan-card__body">
          <h3>{{PLAN_3_NAME}}</h3>
          <p class="plan-price">{{PLAN_3_PRICE}}</p>
          <p>{{PLAN_3_DESC}}</p>
        </div>
      </article>
    </div>
  </div>
</section>
