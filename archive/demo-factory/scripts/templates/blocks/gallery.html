<section class="section gallery-wrap" id="galeria">
  <div class="gallery-shell">
    <header class="section-head gallery-head">
      <p class="eyebrow">Galeria visual</p>
      <h2>Escenas que sostienen la propuesta</h2>
      <p>Una banda visual curada para reforzar percepcion, contexto y profesionalismo sin distraer del CTA principal.</p>
    </header>
    <div class="gallery-proof">
      <span>Presentacion premium</span>
      <span>Imagenes orientadas a confianza</span>
      <span>Lista para catalogo</span>
    </div>
    <div class="gallery-grid" role="list" aria-label="Galeria visual de {{BUSINESS_NAME}}">
      <figure class="gallery-frame gallery-frame--primary" role="listitem">
        <img src="{{GALLERY_IMAGE_1}}" alt="Galeria 1 {{BUSINESS_NAME}}" loading="lazy" />
      </figure>
      <figure class="gallery-frame" role="listitem">
        <img src="{{GALLERY_IMAGE_2}}" alt="Galeria 2 {{BUSINESS_NAME}}" loading="lazy" />
      </figure>
      <figure class="gallery-frame" role="listitem">
        <img src="{{GALLERY_IMAGE_3}}" alt="Galeria 3 {{BUSINESS_NAME}}" loading="lazy" />
      </figure>
      <figure class="gallery-frame gallery-frame--secondary" role="listitem">
        <img src="{{GALLERY_IMAGE_4}}" alt="Galeria 4 {{BUSINESS_NAME}}" loading="lazy" />
      </figure>
    </div>
  </div>
</section>
