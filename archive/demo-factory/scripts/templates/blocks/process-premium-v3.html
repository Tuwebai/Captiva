<section class="section process" id="metodologia">

    <p class="eyebrow">Como operamos</p>
    <h2>{{PROCESS_TITLE}}</h2>
    <p>{{PROCESS_DESC}}</p>
  </header>
  <div class="process-grid process-grid--operator">
    <article class="process-card process-card-main">
      <div class="process-index">01</div>
      <p class="process-label">Direccion del mensaje</p>
      <h3>{{STEP_1_TITLE}}</h3>
      <p>{{STEP_1_DESC}}</p>
      <a href="#contacto" class="process-link">{{CTA_TEXT}}</a>
    </article>
    <div class="process-side-stack">
      <article class="process-card">
        <div class="process-index">02</div>
        <p class="process-label">Operativa</p>
        <h3>{{STEP_2_TITLE}}</h3>
        <p>{{STEP_2_DESC}}</p>
      </article>
      <article class="process-card">
        <div class="process-index">03</div>
        <p class="process-label">Salida comercial</p>
        <h3>{{STEP_3_TITLE}}</h3>
        <p>{{STEP_3_DESC}}</p>
      </article>
      <article class="process-side-panel">
        <p class="process-label">Soporte</p>
        <h3>{{PROCESS_COMMUNITY_TITLE}}</h3>
        <p>{{PROCESS_COMMUNITY_DESC}}</p>
      </article>
    </div>
  </div>
