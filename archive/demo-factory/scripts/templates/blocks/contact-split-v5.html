<section class="section contact-split" id="contacto">
  <div class="contact-shell contact-shell--minimal">
    <header class="section-head contact-intro">
      <p class="eyebrow">Contacto</p>
      <h2>{{CONTACT_TITLE}}</h2>
      <p>{{CONTACT_DESC}}</p>
    </header>
    <div class="contact-grid contact-grid--balanced">
      <aside class="contact-panel contact-panel--minimal">
        <ul class="contact-list">
          <li><strong>Email:</strong> {{CONTACT_EMAIL}}</li>
          <li><strong>WhatsApp:</strong> +54 9 3571 417960</li>
          <li><strong>Rubro:</strong> {{CATEGORY_LABEL}}</li>
        </ul>
      </aside>
      <form class="form form--minimal" id="leadForm">
        <p class="form-kicker">Brief corto</p>
        <label>
          <span class="field-label">Nombre</span>
          <input class="field" placeholder="Nombre completo" required />
        </label>
        <label>
          <span class="field-label">WhatsApp</span>
          <input class="field" placeholder="+54 9 ..." required type="tel" />
        </label>
        <label>
          <span class="field-label">Objetivo</span>
          <textarea class="field" placeholder="Contanos tu objetivo" rows="4"></textarea>
        </label>
        <button class="btn btn-primary" id="submitBtn" type="submit">{{CTA_TEXT}}</button>
        <p class="ok" id="okMsg">Solicitud simulada enviada. En produccion iria a CRM / WhatsApp.</p>
      </form>
    </div>
  </div>
</section>
