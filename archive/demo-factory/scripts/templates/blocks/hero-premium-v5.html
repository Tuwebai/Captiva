<section class="hero section hero--proof-stack" id="hero">
  <div class="hero-grid">
    <article class="hero-copy">
      <p class="eyebrow">{{CATEGORY_LABEL}} | premium minimal</p>
      <h1>{{TITLE}}</h1>
      <p class="hero-lead">{{HEADLINE}}</p>
      <p class="hero-body">{{DESCRIPTION}}</p>
      <ul class="hero-trust" aria-label="Puntos clave de conversion">
        <li><span>{{TRUST_1}}</span></li>
        <li><span>{{TRUST_2}}</span></li>
        <li><span>{{TRUST_3}}</span></li>
      </ul>
      <div class="hero-actions">
        <a class="btn btn-primary" href="#contacto">{{CTA_TEXT}}</a>
        <a class="btn btn-secondary" href="#planes">{{CTA_SECONDARY}}</a>
      </div>
    </article>
    <aside class="hero-side-proof" aria-label="Prueba de conversion">
      <article class="hero-proof-tile">
        <span class="hero-media__label">Señal 1</span>
        <strong>{{PROOF_VALUE_1}}</strong>
        <span>{{PROOF_LABEL_1}}</span>
      </article>
      <article class="hero-proof-tile">
        <span class="hero-media__label">Señal 2</span>
        <strong>{{PROOF_VALUE_2}}</strong>
        <span>{{PROOF_LABEL_2}}</span>
      </article>
      <article class="hero-proof-tile">
        <span class="hero-media__label">Señal 3</span>
        <strong>{{PROOF_VALUE_3}}</strong>
        <span>{{PROOF_LABEL_3}}</span>
      </article>
    </aside>
  </div>
</section>
