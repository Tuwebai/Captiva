<section class="section process" id="metodologia">
  <header class="section-head process-head">
    <p class="eyebrow">Metodo comercial</p>
    <h2>{{PROCESS_TITLE}}</h2>
    <p>{{PROCESS_DESC}}</p>
  </header>
  <div class="process-grid process-grid--timeline">
    <div class="process-stack">
      <article class="process-step-line">
        <div class="process-index">01</div>
        <div>
          <p class="process-label">Diagnostico</p>
          <h3>{{STEP_1_TITLE}}</h3>
          <p>{{STEP_1_DESC}}</p>
        </div>
      </article>
      <article class="process-step-line">
        <div class="process-index">02</div>
        <div>
          <p class="process-label">Construccion</p>
          <h3>{{STEP_2_TITLE}}</h3>
          <p>{{STEP_2_DESC}}</p>
        </div>
      </article>
      <article class="process-step-line">
        <div class="process-index">03</div>
        <div>
          <p class="process-label">Activacion</p>
          <h3>{{STEP_3_TITLE}}</h3>
          <p>{{STEP_3_DESC}}</p>
        </div>
      </article>
    </div>
    <aside class="process-side-panel">
      <p class="process-label">Checklist</p>
      <h3>{{PROCESS_COMMUNITY_TITLE}}</h3>
      <p>{{PROCESS_COMMUNITY_DESC}}</p>
      <a href="#contacto" class="btn btn-primary">{{CTA_TEXT}}</a>
    </aside>
  </div>
</section>
