<svg width="640" height="420" viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="captivaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A18"/>
      <stop offset="50%" stop-color="#7B3FE4"/>
      <stop offset="100%" stop-color="#2F80ED"/>
    </linearGradient>
    <linearGradient id="softGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="640" height="420" rx="16" fill="#0f172a"/>
  <circle cx="100" cy="380" r="180" fill="url(#captivaGradient)" opacity="0.35"/>
  <circle cx="580" cy="40" r="140" fill="url(#captivaGradient)" opacity="0.25"/>
  <rect width="640" height="420" rx="16" fill="url(#softGlow)"/>

  <rect x="120" y="80" width="400" height="240" rx="12" fill="#111827" stroke="#ffffff20"/>
  <rect x="120" y="80" width="400" height="40" rx="12" fill="#1f2937"/>

  <circle cx="145" cy="100" r="5" fill="#ef4444"/>
  <circle cx="165" cy="100" r="5" fill="#f59e0b"/>
  <circle cx="185" cy="100" r="5" fill="#10b981"/>

  <rect x="140" y="140" width="360" height="60" rx="6" fill="url(#captivaGradient)" opacity="0.9"/>

  <rect x="140" y="220" width="220" height="10" rx="4" fill="#334155"/>
  <rect x="140" y="240" width="260" height="10" rx="4" fill="#334155"/>

  <rect x="140" y="270" width="120" height="32" rx="6" fill="url(#captivaGradient)"/>

  <text
    x="320"
    y="360"
    text-anchor="middle"
    font-family="Inter, Arial"
    font-size="16"
    fill="#94a3b8"
  >
    Captiva Demo
